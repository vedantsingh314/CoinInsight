<svg width="340" height="90" viewBox="0 0 340 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"></stop>
      <stop offset="50%" stop-color="#06b6d4"></stop>
      <stop offset="100%" stop-color="#22c55e"></stop>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Eye Shape -->
  <ellipse cx="45" cy="45" rx="30" ry="18" fill="none" stroke="url(#neonGrad)" stroke-width="3"></ellipse>

  <!-- Inner circle (pupil / insight) -->
  <circle cx="45" cy="45" r="10" fill="url(#neonGrad)" filter="url(#glow)"></circle>

  <!-- Signal rings -->
  <circle cx="45" cy="45" r="18" fill="none" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1"></circle>
  <circle cx="45" cy="45" r="24" fill="none" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="1"></circle>

  <!-- Text -->
  <text x="90" y="55" font-family="Poppins, Arial, sans-serif" font-size="30" fill="#e5e7eb" letter-spacing="1">
    Crypto
    <tspan fill="url(#neonGrad)">Insight</tspan>
  </text>
</svg>